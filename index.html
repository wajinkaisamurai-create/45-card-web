<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>45数カード</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">Kabbalah Oral Numerology Cards</p>
        <h1>45数カード</h1>
      </header>

      <section class="controls" aria-label="カード操作">
        <div class="mode-switch" role="group" aria-label="引き方">
          <button class="mode-button is-active" type="button" data-mode="single">1枚引き</button>
          <button class="mode-button" type="button" data-mode="three">3枚引き</button>
        </div>

        <div class="action-row">
          <button id="shuffleButton" class="primary-button" type="button">シャッフル</button>
          <button id="drawButton" class="secondary-button" type="button" disabled>引く</button>
        </div>
      </section>

      <p id="statusText" class="status-text" aria-live="polite">シャッフルしてください。</p>

      <section id="cardArea" class="card-area is-empty" aria-label="カード表示">
        <div class="deck-placeholder" aria-hidden="true">
          <div class="deck-card"></div>
          <div class="deck-card"></div>
          <div class="deck-card"></div>
        </div>
      </section>
    </main>

    <script src="./cards-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
